name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore DevOpsApi/DevOpsApi.csproj

    - name: Build
      run: dotnet build DevOpsApi/DevOpsApi.csproj -c Release --no-restore

    - name: Build Docker Image
      run: docker build -t devops-api:${{ github.sha }} .
